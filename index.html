    const ZoomImage = ({ src, alt }) => {
      const [zoomStyle, setZoomStyle] = useState({ display: 'none' });
      const [isZooming, setIsZooming] = useState(false);
      const containerRef = useRef(null);

      const handleMouseMove = (e) => {
        const { left, top, width, height } = containerRef.current.getBoundingClientRect();
        const x = ((e.pageX - left - window.scrollX) / width) * 100;
        const y = ((e.pageY - top - window.scrollY) / height) * 100;
        
        setZoomStyle({
          display: 'block',
          backgroundImage: `url(${src})`,
          backgroundPosition: `${x}% ${y}%`,
          backgroundSize: '250%'
        });
      };

      return (
        <div 
          ref={containerRef}
          className="relative overflow-hidden rounded-2xl bg-slate-200 aspect-[3/4] cursor-crosshair touch-none shadow-md border border-slate-300"
          onMouseEnter={() => setIsZooming(true)}
          onMouseLeave={() => setIsZooming(false)}
          onMouseMove={handleMouseMove}
        >
          <img 
            src={src} 
            alt={alt} 
            className={`w-full h-full object-cover transition-opacity duration-300 ${isZooming ? 'opacity-0' : 'opacity-100'}`} 
          />
          {isZooming && (
            <div 
              className="absolute inset-0 pointer-events-none transition-opacity duration-300 border-4 border-indigo-600/20"
              style={zoomStyle}
            />
          )}
          <div className="absolute bottom-3 right-3 bg-indigo-950/80 backdrop-blur-sm p-1.5 rounded-lg">
            <SearchIcon className="w-4 h-4 text-white" />
          </div>
        </div>
      );
    };

    // Compact Product Tile layout representing smaller dimensions and triggers details modal
    const ProductCard = ({ product, onSelect }) => {
      // Shorten the description slightly for the smaller preview tiles
      const trimmedDescription = product.description.length > 80 
        ? product.description.substring(0, 80) + '...' 
        : product.description;

      return (
        <div 
          onClick={() => onSelect(product)}
          className="group flex flex-col h-full bg-white rounded-2xl p-4 shadow-md hover:shadow-xl border-2 border-slate-200 hover:border-indigo-600 transition-all duration-300 cursor-pointer"
        >
          <div className="relative overflow-hidden rounded-xl aspect-[3/4] bg-slate-100">
            <img 
              src={product.image} 
              alt={product.name} 
              className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />

      const [quantity, setQuantity] = useState(1);

      const currentPrice = product.prices[selectedSize];

      const handleAddToCart = () => {
        onAdd(product, selectedSize, quantity);
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto">
          {/* Glassmorphism backdrop blurring the catalog background */}
          <div 
            className="fixed inset-0 bg-indigo-950/40 backdrop-blur-md transition-opacity duration-300" 
            onClick={onClose} 
          />
          
          {/* Main Modal Container */}

            {/* Close Trigger Button */}
            <button 
              onClick={onClose} 
              className="absolute top-4 right-4 p-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-full transition-colors z-20"
            >

            </button>
            
            {/* Left Column: Premium Zoom Image */}

              <ZoomImage src={product.image} alt={product.name} />
            </div>
            
            {/* Right Column: Dynamic details, selectors and CTA */}

                <h3 className="font-black text-3xl text-indigo-950 leading-tight uppercase mb-2 mt-2">

                  <span className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                    {isCustomPrice ? "Hecho a medida" : "Valor según talla"}

                </div>
                
                <p className="text-xs text-slate-700 font-semibold leading-relaxed mb-6">
                  {product.description}
                </p>

                {/* Size Selector */}

                  <label className="text-xs uppercase font-black text-indigo-950 tracking-widest block border-b border-slate-100 pb-1">
                    Selecciona la Talla:
                  </label>
                  <div className="grid grid-cols-5 gap-2 max-h-[110px] overflow-y-auto pr-1">
                    {product.sizes.map(size => (
                      <button 
                        key={size}
                        onClick={() => setSelectedSize(size)}
                        className={`h-9 text-[11px] font-black rounded-lg transition-all border-2 ${
                          selectedSize === size 
                          ? 'bg-indigo-950 border-indigo-950 text-white shadow-md' 
                          : 'bg-white border-slate-300 text-slate-950 hover:border-indigo-600 hover:bg-slate-50'
                        }`}
                      >
                        {size}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Quantity Selector */}
                <div className="space-y-3 mb-6">
                  <label className="text-xs uppercase font-black text-indigo-950 tracking-widest block border-b border-slate-100 pb-1">
                    Cantidad:
                  </label>
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={() => setQuantity(prev => Math.max(1, prev - 1))}
                      className="w-8 h-8 flex items-center justify-center bg-slate-100 hover:bg-indigo-950 hover:text-white rounded-lg transition-all font-bold text-base"
                    >
                      -
                    </button>
                    <span className="text-base font-black w-10 text-center text-slate-950">{quantity}</span>
                    <button 
                      onClick={() => setQuantity(prev => prev + 1)}
                      className="w-8 h-8 flex items-center justify-center bg-slate-100 hover:bg-indigo-950 hover:text-white rounded-lg transition-all font-bold text-base"
                    >
                      +
                    </button>
                  </div>
                </div>
              </div>

              {/* Subtotal & Add Button */}
              <div className="space-y-4 border-t border-slate-100 pt-4">
                {!isCustomPrice && (
                  <div className="flex items-center justify-between">
                    <span className="text-xs text-slate-500 font-bold uppercase">Subtotal del item:</span>
                    <span className="text-xl font-black text-slate-950">${(currentPrice * quantity).toLocaleString('es-CL')} CLP</span>
                  </div>
                )}
                
                <button 
                  onClick={handleAddToCart}
                  className="w-full bg-indigo-950 hover:bg-indigo-800 text-white py-4 rounded-xl font-black flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg uppercase tracking-widest text-xs"
                >
                  <PlusIcon className="w-5 h-5 mr-1" /> Agregar al Carro
                </button>
              </div>
              
            </div>
            
          </div>
        </div>
      );
    };

    function App() {
      const [cart, setCart] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [formData, setFormData] = useState({
        name: '',
        phone: '',
        commune: '',
        grade: '',
        notes: ''
      });

      const BUSINESS_PHONE = "56994754523"; // Número oficial de Mary
      const PICKUP_ADDRESS = "Avenida Principal Capitán Ignacio Carrera Pinto 805, Recoleta";
      
      const GOOGLE_MAPS_URL = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(PICKUP_ADDRESS)}`;
      const APPLE_MAPS_URL = `https://maps.apple.com/?q=${encodeURIComponent(PICKUP_ADDRESS)}`;

      const addToCart = (product, size, qtyToAdd = 1) => {
        const priceForSize = product.prices[size];
        const cartId = `${product.id}-${size}`;
        const existing = cart.find(item => item.cartId === cartId);
        
        if (existing) {
          setCart(cart.map(item => 
            item.cartId === cartId ? { ...item, quantity: item.quantity + qtyToAdd } : item
          ));
        } else {
          setCart([...cart, { 
            ...product, 
            cartId, 
            selectedSize: size, 
            price: priceForSize, 
            quantity: qtyToAdd 
          }]);
        }
        setIsCartOpen(true);
      };

      const removeFromCart = (cartId) => {
        setCart(cart.filter(item => item.cartId !== cartId));
      };

      const updateQuantity = (cartId, delta) => {
        setCart(cart.map(item => {
          if (item.cartId === cartId) {
            const newQty = Math.max(1, item.quantity + delta);
            return { ...item, quantity: newQty };
          }
          return item;
        }));
      };

      // Filter out non-numeric prices (like "CONSULTENOS") from the mathematical cart subtotal sum
      const total = cart.reduce((sum, item) => {
        const numericPrice = typeof item.price === 'number' ? item.price : 0;
        return sum + (numericPrice * item.quantity);
      }, 0);

      // Check if there is any custom-measured product added to the cart
      const hasCustomItems = cart.some(item => item.price === "CONSULTENOS");

      const handleSendWhatsApp = (e) => {
        e.preventDefault();
        if (!formData.name || !formData.phone || !formData.commune) return;

        let message = `*NUEVO PEDIDO (RETIRO) - CONFECCIONES MARY*\n`;
        message += `_Escuela El Carmen 270_\n\n`;
        message += `👤 *Nombre Apoderado:* ${formData.name}\n`;
        message += `📞 *WhatsApp:* ${formData.phone}\n`;
        message += `📍 *Comuna de Procedencia:* ${formData.commune}\n`;
        if(formData.grade) message += `🏫 *Curso Estudiante:* ${formData.grade}\n`;
        if(formData.notes) message += `📝 *Indicaciones/Notas:* ${formData.notes}\n`;
        message += `\n📦 *MODALIDAD:* RETIRO Y PAGO PRESENCIAL\n`;
        message += `📍 *Dirección de Retiro:* ${PICKUP_ADDRESS}\n`;
        message += `\n--- *DETALLE DEL PEDIDO* ---\n`;

        cart.forEach(item => {
          const formattedPrice = typeof item.price === 'number' 
            ? `$${(item.price * item.quantity).toLocaleString('es-CL')} CLP` 
            : 'Por convenir (confección a medida)';
          message += `• ${item.quantity}x ${item.name}\n  └ Talla: ${item.selectedSize} - ${formattedPrice}\n`;
        });

        message += `\n💰 *TOTAL ESTIMADO DE PRENDAS ESTÁNDAR:* $${total.toLocaleString('es-CL')} CLP`;
        if (hasCustomItems) {
          message += `\n⚠️ *Nota:* El pedido incluye prendas personalizadas (Polerón Generacional o tallas especiales 2XL/3XL) cuyo valor final a medida se acuerda en el taller.`;
        }
        message += `\n\n_Hola Mary, vi tu página web y te escribo para encargarte los uniformes de la Escuela El Carmen. Me gustaría coordinar el retiro y pago presencial en tu taller de Av. Principal Cap. Ignacio Carrera Pinto 805, Recoleta._`;

        window.open(`https://wa.me/${BUSINESS_PHONE}?text=${encodeURIComponent(message)}`, '_blank');
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-950">
          
          {/* Navegación Principal - NAVBAR NO PEGAJOSA */}
          <nav className="relative z-40 bg-indigo-950 border-b-4 border-amber-400 shadow-xl">
            <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between relative">
              
              {/* Logo con posicionamiento absoluto */}
              <a href="#" className="absolute left-4 top-1 z-50 flex items-center">
                <img 
                  src="https://i.ibb.co/k6yL62mW/conflogo2.png" 
                  alt="Confecciones Mary Logo" 
                  className="h-28 md:h-36 w-auto object-contain drop-shadow-xl origin-top-left"
                />
              </a>
              
              {/* Espaciador para mantener centrado y alineado el botón del carro */}
              <div className="flex-1"></div>
              
              <button 
                onClick={() => setIsCartOpen(true)}
                className="group relative p-3 bg-amber-400 hover:bg-white rounded-full transition-all shadow-lg active:scale-90 z-50"
              >
                <ShoppingCartIcon className="w-6 h-6 text-indigo-950" />
                {cart.length > 0 && (
                  <span className="absolute -top-1 -right-1 bg-white text-indigo-950 text-[11px] font-black w-6 h-6 flex items-center justify-center rounded-full ring-2 ring-indigo-950 animate-pulse">
                    {cart.reduce((acc, curr) => acc + curr.quantity, 0)}
                  </span>
                )}
              </button>
            </div>
          </nav>

          {/* Hero Bienvenida - Background Image visibility enhanced */}
          <header 
            className="relative py-24 px-4 bg-white bg-cover bg-center overflow-hidden"
            style={{ backgroundImage: "url('https://i.ibb.co/zW40Wg1p/sewing.jpg')" }}
          >
            <div className="absolute inset-0 bg-white/60 z-0" />

            <div className="relative z-10 max-w-4xl mx-auto text-center">
              <span className="inline-block px-5 py-2 bg-amber-200 text-amber-950 rounded-lg text-xs font-black uppercase tracking-[0.2em] mb-8 border-2 border-amber-400 shadow-md">
                📍 Retiro y pago exclusivo en taller (Recoleta) • Previa coordinación
              </span>
              
              <h2 className="text-5xl md:text-7xl font-black text-indigo-950 mb-8 leading-[0.9] tracking-tighter drop-shadow-[0_2px_8px_rgba(255,255,255,1)]">
                Uniformes hechos para <br/>
                <span className="text-indigo-600">durar todo el año escolar.</span>
              </h2>
              
              <p className="text-slate-900 max-w-2xl mx-auto text-xl font-bold leading-relaxed drop-shadow-[0_2px_6px_rgba(255,255,255,1)]">
                Confección nacional de alta calidad pensada para el día a día de los escolares. Elige las tallas oficiales, ingresa tus datos y coordina el retiro presencial de forma directa por WhatsApp.
              </p>
            </div>
          </header>

          {/* Section: 4 Trust Pillars / Badges right below Hero */}
          <section className="bg-white border-t border-slate-100 pb-16 px-4">
            <div className="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              
              {/* Pillar 1: Personalized Service (Pink Tape Heart) */}
              <div className="flex flex-col items-center text-center p-6 bg-slate-50/50 rounded-3xl border-2 border-slate-100 hover:border-pink-600/30 hover:bg-slate-50 transition-all duration-300">
                <div className="w-14 h-14 rounded-2xl bg-pink-50 flex items-center justify-center text-pink-500 mb-5 shadow-sm">
                  <PinkMeasureHeartIcon className="w-7 h-7" />
                </div>
                <h3 className="font-black text-base text-indigo-950 uppercase tracking-tight mb-2">Servicio a tu Medida</h3>
                <p className="text-xs text-slate-700 font-semibold leading-relaxed">
                  Atención exclusiva y personalizada. Mary atiende individualmente a cada apoderado para asesorar y asegurar el calce perfecto.
                </p>
              </div>

              {/* Pillar 2: Made in Chile / Local Manufacturing (Chilean Flag) */}
              <div className="flex flex-col items-center text-center p-6 bg-slate-50/50 rounded-3xl border-2 border-slate-100 hover:border-blue-600/30 hover:bg-slate-50 transition-all duration-300">
                <div className="w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center mb-5 shadow-sm border border-blue-100">
                  <ChileFlagIcon className="w-9 h-7 text-indigo-950" />
                </div>
                <h3 className="font-black text-base text-indigo-950 uppercase tracking-tight mb-2">Confección Nacional</h3>
                <p className="text-xs text-slate-700 font-semibold leading-relaxed">
                  100% Hecho en Chile. Confección artesanal y telas nacionales de alto tráfico para garantizar máxima durabilidad.
                </p>
              </div>

              {/* Pillar 3: Since 1998 / Tradition of Trust (Golden Laurel Wreath) */}
              <div className="flex flex-col items-center text-center p-6 bg-slate-50/50 rounded-3xl border-2 border-slate-100 hover:border-amber-500/30 hover:bg-slate-50 transition-all duration-300">
                <div className="w-14 h-14 rounded-2xl bg-amber-50 flex items-center justify-center text-amber-500 mb-5 shadow-sm">
                  <GoldenLaurelTrustIcon className="w-7 h-7" />
                </div>
                <h3 className="font-black text-base text-indigo-950 uppercase tracking-tight mb-2">Garantía de Confianza</h3>
                <p className="text-xs text-slate-700 font-semibold leading-relaxed">
                  Desde 1998. Casi 30 años vistiendo con prestigio e impecable costura oficial a generaciones del colegio El Carmen.
                </p>
              </div>

              {/* Pillar 4: Year-Round Availability (Emerald Circle Loop) */}
              <div className="flex flex-col items-center text-center p-6 bg-slate-50/50 rounded-3xl border-2 border-slate-100 hover:border-emerald-600/30 hover:bg-slate-50 transition-all duration-300">
                <div className="w-14 h-14 rounded-2xl bg-emerald-50 flex items-center justify-center text-emerald-600 mb-5 shadow-sm">
                  <YearRoundIcon className="w-7 h-7" />
                </div>
                <h3 className="font-black text-base text-indigo-950 uppercase tracking-tight mb-2">Venta Todo el Año</h3>
                <p className="text-xs text-slate-700 font-semibold leading-relaxed">
                  Sin apuro escolar. Mantenemos stock y confección activa los 12 meses para reposiciónes o emergencias.
                </p>
              </div>

            </div>
          </section>

          {/* Seccion Experiencia Escuela El Carmen 270 */}
          <section 
            className="relative text-white py-20 px-4 border-y-4 border-amber-400 bg-cover bg-center overflow-hidden"
            style={{ backgroundImage: "url('https://i.ibb.co/tpVSjPtw/DSC-1262.jpg')" }}
          >
            <div className="absolute inset-0 bg-indigo-950/65" />

            <div className="relative z-10 max-w-6xl mx-auto flex flex-col lg:flex-row items-center gap-12">
              
              {/* Insignia Escolar */}
              <div className="w-full lg:w-1/3 flex flex-col items-center text-center bg-indigo-950/80 backdrop-blur-md rounded-3xl p-8 border-2 border-white/20 shadow-2xl relative overflow-hidden group">
                <a 
                  href="https://escuelaelcarmen.cl/"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="w-40 h-40 rounded-2xl bg-slate-950/60 p-4 flex items-center justify-center shadow-inner mb-4 border border-white/15 transition-all duration-300 hover:border-amber-400/60 hover:bg-slate-900 group/logo relative cursor-pointer"
                  title="Visitar sitio oficial de la Escuela El Carmen"
                >
                  <img 
                    src="https://i.ibb.co/Q70MkfS1/esc270logo.png" 
                    alt="Escuela El Carmen 270 Conchalí" 
                    className="max-w-full max-h-full object-contain filter drop-shadow-[0_4px_8px_rgba(255,255,255,0.1)] transition-transform duration-300 group-hover/logo:scale-110"
                    onError={(e) => {
                      e.target.onerror = null;
                      e.target.src = "https://images.unsplash.com/photo-1546410531-bb4caa6b424d?auto=format&fit=crop&w=150";
                    }}
                  />
                  <div className="absolute inset-0 bg-indigo-950/20 opacity-0 group-hover/logo:opacity-100 transition-opacity rounded-2xl flex items-center justify-center">
                    <ExternalLinkIcon className="w-6 h-6 text-amber-400 drop-shadow-md" />
                  </div>
                </a>
                
                <h3 className="font-black text-lg text-amber-400 uppercase tracking-tight">Escuela El Carmen 270</h3>
                <p className="text-xs text-indigo-200 font-bold uppercase tracking-widest mt-1">Conchalí</p>
                
                <a 
                  href="https://escuelaelcarmen.cl/" 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  className="mt-3 inline-flex items-center gap-1.5 text-[10px] font-black uppercase tracking-widest text-indigo-300 hover:text-amber-400 transition-colors"
                >
                  Visitar Sitio Web <ExternalLinkIcon className="w-3 h-3" />
                </a>
              </div>

              {/* Reseña de Proveedor */}
              <div className="w-full lg:w-2/3 space-y-6 drop-shadow-lg">
                <div className="flex flex-wrap items-center gap-3">
                  <span className="bg-amber-400 text-indigo-950 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-wider flex items-center gap-2 shadow-md">
                    <AwardIcon className="w-4 h-4" /> Tradición Escolar
                  </span>
                  <span className="border-2 border-white/30 text-white px-4 py-1 rounded-xl text-xs font-black uppercase tracking-wider bg-indigo-950/30">
                    Desde 1998
                  </span>
                </div>

                <h3 className="text-3xl md:text-5xl font-black tracking-tight leading-none text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                  Vistiendo con Orgullo a <br className="hidden md:inline"/> Generaciones de Estudiantes
                </h3>

                <div className="space-y-4 text-white text-base md:text-lg font-bold leading-relaxed drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]">
                  <p>
                    Por <strong>más de 28 años</strong>, <span className="text-amber-400 font-black">Confecciones Mary</span> ha tenido el orgullo de confeccionar y entregar uniformes de alta calidad para la comunidad de la <strong>Escuela El Carmen 270 de Conchalí</strong>.
                  </p>
                  <p>
                    Nuestra larga trayectoria es reflejo de un compromiso inquebrantable con las familias del sector. Elaboramos cada prenda siguiendo con total fidelidad el patrón de diseño, los colores institucionales exactos y un bordado de alta definición resistente al desgaste del uso constante y los lavados frecuentes.
                  </p>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4">
                  <div className="flex items-start gap-3 bg-indigo-955/80 p-4 rounded-2xl border border-white/10 shadow-lg">
                    <div className="p-2 bg-amber-400 rounded-lg text-indigo-950 shrink-0">
                      <ShieldCheckIcon className="w-5 h-5" />
                    </div>
                    <div>
                      <h4 className="font-black text-sm uppercase text-white tracking-wide">Fidelidad de Diseño</h4>
                      <p className="text-xs text-indigo-150 font-semibold">Bordados de alta precisión y colores institucionales exactos.</p>
                    </div>
                  </div>
                  <div className="flex items-start gap-3 bg-indigo-955/80 p-4 rounded-2xl border border-white/10 shadow-lg">
                    <div className="p-2 bg-amber-400 rounded-lg text-indigo-950 shrink-0">
                      <MapPinIcon className="w-5 h-5" />
                    </div>
                    <div>
                      <h4 className="font-black text-sm uppercase text-white tracking-wide">Retiro en Taller</h4>
                      <p className="text-xs text-indigo-150 font-semibold">Ubicado estratégicamente para un retiro expedito.</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Map and Pickup details Block */}
          <section className="bg-slate-100 py-16 px-4 border-b-2 border-slate-200">
            <div className="max-w-5xl mx-auto bg-white rounded-[2.5rem] p-8 md:p-12 shadow-xl border-2 border-slate-200">
              <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-8">
                <div className="space-y-4 flex-1">
                  <div className="inline-flex items-center gap-2 bg-indigo-550/10 text-indigo-950 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-wider">
                    <MapPinIcon className="w-4 h-4 text-indigo-700 animate-bounce" /> Dirección del Taller
                  </div>
                  <h3 className="text-2xl md:text-4xl font-black text-slate-950 uppercase tracking-tighter">
                    ¿Dónde se retira el pedido?
                  </h3>
                  <p className="text-slate-800 font-semibold text-lg leading-relaxed">
                    Taller de costura ubicado en:<br/>
                    <span className="text-indigo-900 font-black">{PICKUP_ADDRESS}</span>
                  </p>
                  <p className="text-sm text-slate-500 font-medium">
                    * El retiro y pago presencial se coordinan directamente por WhatsApp.
                  </p>
                </div>
                
                <div className="w-full md:w-auto shrink-0 flex flex-col sm:flex-row md:flex-col gap-3">
                  <a 
                    href={GOOGLE_MAPS_URL} 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="flex items-center justify-center gap-3 px-6 py-4 bg-indigo-950 hover:bg-indigo-800 text-white rounded-xl font-black text-sm uppercase tracking-wider transition-all shadow-md hover:shadow-lg active:scale-95"
                  >
                    <NavigationIcon className="w-5 h-5 text-amber-400" /> Abrir en Google Maps
                  </a>
                  <a 
                    href={APPLE_MAPS_URL} 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="flex items-center justify-center gap-3 px-6 py-4 bg-white hover:bg-slate-50 text-indigo-950 border-2 border-indigo-950 rounded-xl font-black text-sm uppercase tracking-wider transition-all shadow-sm active:scale-95"
                  >
                    <ExternalLinkIcon className="w-5 h-5 text-indigo-950" /> Abrir en Apple Maps
                  </a>
                </div>
              </div>
            </div>
          </section>

          {/* Catálogo */}
          <main className="max-w-7xl mx-auto px-4 py-20">
            <div className="flex items-center gap-6 mb-16">
              <h2 className="text-3xl font-black text-indigo-950 uppercase tracking-tighter shrink-0">Catálogo Oficial</h2>
              <div className="h-2 bg-amber-400 w-24 rounded-full"></div>
              <div className="h-px bg-slate-300 flex-1"></div>
            </div>
            
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
              {PRODUCTS.map(product => (
                <ProductCard 
                  key={product.id} 
                  product={product} 
                  onSelect={(prod) => setSelectedProduct(prod)} 
                />
              ))}
            </div>
          </main>

          {/* Product Detail Modal */}
          {selectedProduct && (
            <ProductDetailModal 
              product={selectedProduct} 
              onClose={() => setSelectedProduct(null)} 
              onAdd={addToCart}

          {/* Carro de Compras Lateral */}

              <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-500">
                <div className="p-8 border-b-4 border-amber-400 flex items-center justify-between bg-indigo-950 text-white">

                    <p className="text-xs text-amber-400 font-bold uppercase tracking-widest mt-1">Confecciones Mary</p>

                  ) : (

                      return (
                        <div key={item.cartId} className="flex gap-4 p-4 bg-white rounded-2xl border-2 border-slate-200 shadow-sm animate-in fade-in slide-in-from-bottom-2">

                                <button onClick={() => updateQuantity(item.cartId, -1)} className="w-8 h-8 flex items-center justify-center bg-white hover:bg-indigo-600 hover:text-white rounded-md transition-all shadow-sm font-bold text-lg">-</button>
                                <span className="text-sm font-black w-8 text-center text-slate-950">{item.quantity}</span>
                                <button onClick={() => updateQuantity(item.cartId, 1)} className="w-8 h-8 flex items-center justify-center bg-white hover:bg-indigo-600 hover:text-white rounded-md transition-all shadow-sm font-bold text-lg">+</button>
                              </div>
                              <span className="font-black text-lg text-slate-950">
                                {isCustom ? "A convenir" : `$${(item.price * item.quantity).toLocaleString('es-CL')}`}
                              </span>
                            </div>
                          </div>
                          <button onClick={() => removeFromCart(item.cartId)} className="text-slate-400 hover:text-red-600 transition-colors p-1">
                            <XIcon className="w-5 h-5" />
                          </button>
                        </div>
                      );
                    })
                  )}
                </div>

                {/* Formulario de Datos */}
                {cart.length > 0 && (
                  <div className="p-8 border-t-2 border-slate-200 bg-white shadow-2xl overflow-y-auto max-h-[60vh]">
                    {/* Advertencia de Retiro Exclusivo con dirección */}
                    <div className="mb-6 p-4 bg-amber-50 border-2 border-amber-400 rounded-2xl text-amber-950 text-xs font-semibold space-y-2">
                      <div className="flex items-center gap-2">
                        <MapPinIcon className="w-5 h-5 text-amber-600 shrink-0" />
                        <strong>Retiro y Pago en Taller:</strong>
                      </div>
                      <p className="text-slate-800">
                        No hacemos envíos. Debes retirar y pagar tu pedido directamente en el taller ubicado en:<br/>
                        <span className="font-black text-indigo-950">{PICKUP_ADDRESS}</span>
                      </p>
                    </div>

                    <div className="space-y-4 mb-6">
                      <div>
                        <label className="text-[11px] font-black uppercase text-indigo-950 mb-2 block tracking-widest">Nombre del Apoderado</label>
                        <input 
                          type="text" 
                          placeholder="Ej: María José Fuentes" 
                          className="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl text-base font-bold text-slate-950 focus:border-indigo-600 outline-none transition-all"
                          value={formData.name}
                          onChange={e => setFormData({...formData, name: e.target.value})}
                        />
                      </div>
                      
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="text-[11px] font-black uppercase text-indigo-950 mb-2 block tracking-widest">WhatsApp de Contacto</label>
                          <input 
                            type="tel" 
                            placeholder="Ej: +56 9 1234 5678" 
                            className="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl text-sm font-bold text-slate-950 focus:border-indigo-600 outline-none transition-all"
                            value={formData.phone}
                            onChange={e => setFormData({...formData, phone: e.target.value})}
                          />
                        </div>
                        <div>
                          <label className="text-[11px] font-black uppercase text-indigo-950 mb-2 block tracking-widest">Comuna de Residencia</label>
                          <input 
                            type="text" 
                            placeholder="Ej: Recoleta, Conchalí, etc." 
                            className="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl text-sm font-bold text-slate-950 focus:border-indigo-600 outline-none transition-all"
                            value={formData.commune}
                            onChange={e => setFormData({...formData, commune: e.target.value})}
                          />
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="text-[11px] font-black uppercase text-indigo-950 mb-2 block tracking-widest">Curso Estudiante (Opcional)</label>
                          <input 
                            type="text" 
                            placeholder="Ej: 4to Básico A" 
                            className="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl text-sm font-bold text-slate-950 focus:border-indigo-600 outline-none transition-all"
                            value={formData.grade}
                            onChange={e => setFormData({...formData, grade: e.target.value})}
                          />
                        </div>
                        <div>
                          <label className="text-[11px] font-black uppercase text-indigo-950 mb-2 block tracking-widest">Indicaciones de Retiro</label>
                          <input 
                            type="text" 
                            placeholder="Ej: Retira el sábado por la mañana" 
                            className="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl text-sm font-bold text-slate-950 focus:border-indigo-600 outline-none transition-all"
                            value={formData.notes}
                            onChange={e => setFormData({...formData, notes: e.target.value})}
                          />
                        </div>
                      </div>
                    </div>

                    <div className="flex flex-col py-6 border-t-2 border-dashed border-slate-200 space-y-2">
                      <div className="flex items-center justify-between">
                        <span className="text-slate-600 font-bold uppercase text-xs tracking-[0.2em]">Total Estimado Prendas Estándar</span>
                        <span className="text-4xl font-black text-indigo-950">${total.toLocaleString('es-CL')}</span>
                      </div>
                      {hasCustomItems && (
                        <p className="text-xs text-indigo-600 font-extrabold text-right uppercase tracking-wider">
                          + valor de Polerón Generacional o tallas especiales 2XL/3XL (confeccionados a medida en taller)
                        </p>
                      )}
                    </div>

                    <button 
                      onClick={handleSendWhatsApp}
                      disabled={!formData.name || !formData.phone || !formData.commune}
                      className="w-full bg-[#25D366] hover:bg-[#1da851] disabled:opacity-30 disabled:grayscale text-white py-5 rounded-2xl font-black flex items-center justify-center gap-4 transition-all shadow-xl active:scale-[0.98] uppercase tracking-widest text-sm"
                    >
                      <SendIcon className="w-6 h-6 fill-current mr-1" /> Enviar Encargo por WhatsApp
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Pie de página */}
          <footer className="bg-indigo-950 text-white py-24 px-4 border-t-8 border-amber-400">
            <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16">
              <div className="lg:col-span-1">
                
                {/* Logo de imagen en footer */}
                <div className="flex items-center mb-8">
                  <img 
                    src="https://i.ibb.co/k6yL62mW/conflogo2.png" 
                    alt="Confecciones Mary Logo" 
                    className="h-20 md:h-24 w-auto object-contain transition-transform hover:scale-105 duration-300"
                  />
                </div>
                
                <p className="text-lg font-medium text-indigo-100 leading-relaxed opacity-80">
                  Dedicados a vestir a las futuras generaciones con uniformes de alta durabilidad y elegancia. Tradición familiar en cada puntada.
                </p>
              </div>
              
              <div className="space-y-6">
                <h4 className="text-xl font-black uppercase tracking-widest text-amber-400">Dirección & Taller</h4>
                <div className="space-y-4">
                  <div className="bg-white/5 p-4 rounded-2xl border-2 border-white/10 flex items-start gap-4">
                    <MapPinIcon className="w-8 h-8 text-amber-400 shrink-0 mt-1" />
                    <div>
                      <p className="text-[10px] font-black uppercase text-indigo-300 tracking-tighter">Taller de Confección</p>
                      <p className="text-base font-bold text-white leading-tight">{PICKUP_ADDRESS}</p>
                      <div className="flex gap-2 mt-3">
                        <a href={GOOGLE_MAPS_URL} target="_blank" rel="noopener noreferrer" className="text-xs text-amber-400 hover:text-white font-black uppercase tracking-widest flex items-center gap-1">
                          Google Maps <ExternalLinkIcon className="w-3 h-3" />
                        </a>
                        <span className="text-white/20">|</span>
                        <a href={APPLE_MAPS_URL} target="_blank" rel="noopener noreferrer" className="text-xs text-amber-400 hover:text-white font-black uppercase tracking-widest flex items-center gap-1">
                          Apple Maps <ExternalLinkIcon className="w-3 h-3" />
                        </a>
                      </div>
                    </div>
                  </div>
                  <div className="bg-white/5 p-4 rounded-2xl border-2 border-white/10 flex items-center gap-4">
                    <img 
                      src="https://i.ibb.co/bjY9vPqQ/whatsapplogo.png" 
                      alt="WhatsApp Logo" 
                      className="w-10 h-10 object-contain shrink-0" 
                    />
                    <div>
                      <p className="text-[10px] font-black uppercase text-indigo-300 tracking-tighter">WhatsApp Contacto</p>
                      <p className="text-lg md:text-xl font-black whitespace-nowrap text-white leading-tight">+56 9 9475 4523</p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="space-y-6">
                <h4 className="text-xl font-black uppercase tracking-widest text-amber-400">Horario y Entregas</h4>
                <p className="text-indigo-100 font-semibold opacity-80 leading-relaxed">
                  <b>Disponibilidad total de lunes a domingo</b> con horarios completamente flexibles pensados para adaptarse a la rutina de los apoderados.<br/><br/>
                  Los retiros y la hora de entrega en nuestro taller en Recoleta se coordinan de forma personalizada y directa por WhatsApp, pudiendo ser en el momento que más te acomode.
                </p>
              </div>
            </div>
            <div className="max-w-7xl mx-auto border-t border-white/10 mt-20 pt-10 text-center">
              <p className="text-xs font-black uppercase tracking-[0.4em] text-indigo-400">© 2026 CONFECCIONES MARY • SANTIAGO DE CHILE</p>
            </div>
          </footer>
        </div>
      );
    }

    // Render App
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
